# 喵创说 Web 在线体验版自动部署工作流
#
# 功能概述：
# 当 main 分支的 web/ 目录或 package.json 发生变更时，自动构建 Web 版本
# 并部署到 GitHub Pages，访问地址：https://fanquanpp.github.io/MiaoChuangShuo/
#
# 触发条件：
#   1. push 到 main 分支且改动 web/ 或 package.json
#   2. 手动触发（workflow_dispatch）
#
# 权限要求：
#   - contents: read（读取仓库源码）
#   - pages: write（部署到 GitHub Pages）
#   - id-token: write（使用 OIDC 令牌部署）
name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "package.json"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      # 步骤1: 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v5

      # 步骤2: 配置 Node.js 运行环境（统一 Node 24）
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # 步骤3: 安装项目依赖（基于 package-lock.json）
      - name: Install dependencies
        run: npm ci

      # 步骤4: 构建 Web 版本（输出到 dist-web/ 目录）
      - name: Build web version
        run: npm run build:web

      # 步骤5: 复制 docs/ 到 dist-web/docs/ 保留原 TRAE 报名页入口
      # 这样 Pages 根 URL 是 Web 版, /docs/ 子路径是原报名页
      - name: Copy docs directory
        run: cp -r docs dist-web/docs

      # 步骤6: 配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 步骤7: 上传 dist-web/ 作为 Pages 部署产物
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist-web

      # 步骤8: 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
