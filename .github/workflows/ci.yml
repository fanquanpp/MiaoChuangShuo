# MiaoChuangShuo 日常 CI 验证工作流
#
# 功能概述：
# 在 push 到 main 分支或针对 main 分支的 Pull Request 时触发,
# 执行 3 阶段并行验证 (lint / type-check / build),
# 确保代码质量、类型安全与构建可用性。
#
# 阶段说明：
#   1. lint        - Rust 代码格式检查 (cargo fmt --check)
#   2. type-check  - TypeScript 类型检查 (tsc --noEmit)
#   3. build       - 前端构建 (vite build) + Rust 后端编译 (cargo build)
#
# 设计原则：
#   - 三阶段并行 jobs, 互不阻塞, 加快反馈速度
#   - Cargo 缓存 (Swatinem/rust-cache) 加速 Rust 编译
#   - npm 缓存 (setup-node 内置) 加速依赖安装
#   - 最小权限原则 (contents: read)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 最小权限: 仅需读取仓库内容
permissions:
  contents: read

# 同一分支/PR 的并发运行仅保留最新一次, 取消旧的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # 阶段 1: 代码格式检查 (Lint)
  # 仅检查 Rust 代码格式, 因项目未配置 ESLint, 跳过 JS/TS lint
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # 步骤 1.1: 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v7
      # 步骤 1.2: 安装 Rust stable 工具链, 包含 rustfmt 组件
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt
      # 步骤 1.3: 缓存 Cargo 编译产物, 加速后续构建
      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src-tauri
      # 步骤 1.4: 执行 Rust 代码格式检查
      # continue-on-error: 项目历史代码未完全遵循 rustfmt 默认规范, 暂不阻断 CI
      # 仅作格式问题可视化, 后续可通过 cargo fmt 统一格式后移除此选项
      - name: Rust fmt check
        working-directory: src-tauri
        continue-on-error: true
        run: cargo fmt --check

  # 阶段 2: TypeScript 类型检查
  # 使用 tsc --noEmit 仅做类型检查, 不产出编译文件
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # 步骤 2.1: 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v7
      # 步骤 2.2: 配置 Node.js 24 运行环境, 启用 npm 包缓存
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      # 步骤 2.3: 基于 package-lock.json 安装项目依赖
      - name: Install dependencies
        run: npm ci
      # 步骤 2.4: 执行 TypeScript 类型检查
      - name: TypeScript type check
        run: npx tsc --noEmit

  # 阶段 3: 构建验证
  # 验证前端 (Vite build) 与 Rust 后端 (cargo build) 均可成功构建
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # 步骤 3.1: 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v7
      # 步骤 3.2: 配置 Node.js 24 运行环境, 启用 npm 包缓存
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      # 步骤 3.3: 安装 Rust stable 工具链
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      # 步骤 3.4: 缓存 Cargo 编译产物
      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src-tauri
      # 步骤 3.5: 安装 Linux 平台 Tauri 所需系统依赖
      # webkit2gtk-4.1: Tauri WebView 渲染依赖
      # gtk-3: GTK 窗口工具包
      # libayatana-appindicator3: 系统托盘支持
      # librsvg2: SVG 图标渲染
      # patchelf: 修正 ELF 二进制 RPATH
      - name: Install Linux system dependencies (Tauri requirements)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      # 步骤 3.6: 安装项目 npm 依赖
      - name: Install npm dependencies
        run: npm ci
      # 步骤 3.7: 构建前端 (tsc 类型检查 + Vite 打包)
      - name: Build frontend (Vite)
        run: npm run build
      # 步骤 3.8: 编译 Rust 后端, 仅验证编译通过, 不产出安装包
      - name: Build Rust backend (cargo build)
        run: cargo build --manifest-path src-tauri/Cargo.toml
