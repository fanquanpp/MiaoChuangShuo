name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为喵创说提出改进建议！请详细描述你的想法。

  - type: textarea
    id: problem
    attributes:
      label: 你的使用场景
      description: 这个功能解决什么问题？你在什么场景下需要它？
      placeholder: "作为长篇创作者，我在 XX 场景下，经常需要..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望应用如何实现这个功能？如有参考产品截图，请附上。
      placeholder: "我希望应用能..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 是否有其他实现方式或现有工具可以解决？为什么它们不够好？

  - type: dropdown
    id: module
    attributes:
      label: 涉及的核心模块
      options:
        - 创作编辑器
        - 设定库 (Codex)
        - 人物关系图谱
        - 剧情时间线
        - 伏笔追踪
        - 全文搜索
        - AI 创作助手
        - 项目管理 / 导出
        - 设置 / 偏好
        - 其他
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: 行为准则
      options:
        - label: 我已搜索过现有 Issue，确认这是新建议
          required: true
