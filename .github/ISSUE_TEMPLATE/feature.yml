name: ✨ 功能请求
description: 提出新功能或现有功能增强建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出功能建议。请清晰描述您的需求与动机，方便我们评估与排期。
  - type: textarea
    id: motivation
    attributes:
      label: 动机与场景
      description: 您在何种场景下遇到了什么问题？为什么现有方案无法满足？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 您期望项目提供怎样的能力或行为？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您考虑过哪些替代方案？为何不选择它们？
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: 补充说明
      description: 截图、原型图、参考链接或其他补充信息。
    validations:
      required: false