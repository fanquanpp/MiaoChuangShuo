name: 🐛 Bug 报告
description: 报告一个可复现的问题，帮助改进项目
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间反馈 Bug。请尽量完整地填写以下信息，便于快速定位与修复。
        若问题涉及安全漏洞，请改用 SECURITY.md 流程报告，勿在此公开提交。
  - type: textarea
    id: what_happened
    attributes:
      label: 复现步骤
      description: 详细描述触发该问题的步骤，最好可以逐步复现。
      placeholder: |
        1. 进入 '...'
        2. 点击 '...'
        3. 观察 '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述在没有 Bug 的情况下，您期望看到的结果。
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生的情况，可在下方日志框附上错误信息。
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统 / 浏览器或运行时 / 项目版本号等关键信息。
      placeholder: "Windows 11 / Chrome 120 / v1.2.3"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志输出
      description: 相关错误日志或控制台输出，建议用代码块包裹以便阅读。
      render: shell
    validations:
      required: false