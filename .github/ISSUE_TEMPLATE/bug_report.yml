name: Bug 报告
description: 提交一个 Bug 报告帮助我们改进喵创说
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你抽出时间提交 Bug 报告！请尽量完整填写以下信息，以便我们快速定位问题。

  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 在「设置 - 关于」中查看当前版本号（如 v26.8.0）
      placeholder: "v26.8.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 11
        - Windows 10
        - 其他（请在描述中说明）
    validations:
      required: true

  - type: dropdown
    id: hvci
    attributes:
      label: 是否开启 HVCI（内存完整性）
      description: Windows 安全中心 - 设备安全性 - 内核隔离
      options:
        - 已开启
        - 未开启
        - 不确定
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: 问题描述
      description: 发生了什么？你期望发生什么？请尽量描述清晰，附上截图或录屏更佳。
      placeholder: "我在执行 XX 操作时，应用 YY..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 详细列出复现该问题的步骤
      placeholder: |
        1. 打开应用
        2. 点击 '...'
        3. 选择 '...'
        4. 出现错误
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志或错误信息
      description: 如有错误弹窗、控制台输出或日志文件，请粘贴在此处。可在「设置 - 关于 - 打开日志目录」获取日志文件。
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: 行为准则
      options:
        - label: 我已搜索过现有 Issue，确认这是新问题
          required: true
        - label: 我使用的是官方 GitHub Release 版本，非自行编译版本
          required: true
