name: 💬 问题咨询
description: 一般性使用问题请优先前往 Discussions 讨论区
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        ## 提问前请注意

        一般性使用问题、想法讨论、最佳实践咨询，请前往 Discussions 讨论区提问，能获得更快的响应。

        Issue 仅用于记录需要纳入文档的常见问题（FAQ）。如果您确认该问题具有文档化价值，请继续填写下方内容。
  - type: textarea
    id: question
    attributes:
      label: 问题内容
      description: 清晰描述您的问题，并说明期望在文档中以何种形式回答。
    validations:
      required: true