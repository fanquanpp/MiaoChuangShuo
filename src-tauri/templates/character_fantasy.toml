# 奇幻角色模板
# 适用于玄幻/奇幻/仙侠题材，包含种族与魔法体系
# 派生自 character_standard，扩展 race/class 基础字段与 magic_system/combat 模块

id = "char-fantasy"
name = "奇幻角色"
category = "character"
description = "适用于玄幻/奇幻/仙侠题材，包含种族与魔法体系"
icon = "User"
default_enabled_modules = ["personality", "background", "motivation", "magic_system"]

# ===== 基础字段（继承自标准角色 + 种族与阶级扩展）=====
[[base_fields]]
key = "name"
label = "姓名"
field_type = "text"
required = true
placeholder = "角色的全名"

[[base_fields]]
key = "age"
label = "年龄"
field_type = "text"
placeholder = "如：25"

[[base_fields]]
key = "gender"
label = "性别"
field_type = "select"
options = ["男", "女", "其他"]

[[base_fields]]
key = "identity"
label = "身份/职业"
field_type = "text"
placeholder = "如：剑客/学者/商人"

[[base_fields]]
key = "appearance"
label = "外貌描述"
field_type = "richtext"
placeholder = "体型、面容、穿着、标志性特征"

[[base_fields]]
key = "race"
label = "种族"
field_type = "select"
options = ["人族", "精灵", "兽人", "龙族", "魔族", "神族", "其他"]

[[base_fields]]
key = "class"
label = "阶级/职业"
field_type = "text"
placeholder = "如：法师/战士/游侠"

# ===== 可选模块（继承自标准角色 + 魔法体系与战斗能力扩展）=====
[[optional_modules]]
id = "personality"
name = "性格档案"
description = "角色的核心性格特征与行为习惯"
icon = "Heart"

[[optional_modules.fields]]
key = "core_trait"
label = "核心特质"
field_type = "text"
placeholder = "如：执着、温柔、阴鸷"

[[optional_modules.fields]]
key = "strengths"
label = "优点"
field_type = "text"

[[optional_modules.fields]]
key = "weaknesses"
label = "缺点"
field_type = "text"

[[optional_modules.fields]]
key = "habit"
label = "口头禅/习惯动作"
field_type = "text"

[[optional_modules]]
id = "background"
name = "背景故事"
description = "角色的过去经历与性格形成原因"
icon = "BookOpen"

[[optional_modules.fields]]
key = "origin"
label = "出身来历"
field_type = "richtext"

[[optional_modules.fields]]
key = "key_experience"
label = "关键经历"
field_type = "richtext"

[[optional_modules.fields]]
key = "personality_cause"
label = "性格成因"
field_type = "richtext"

[[optional_modules]]
id = "motivation"
name = "动机与目标"
description = "驱动角色行动的内在动机与外在目标"
icon = "Target"

[[optional_modules.fields]]
key = "inner_motivation"
label = "内在动机"
field_type = "text"
help_text = "角色内心真正想要什么"

[[optional_modules.fields]]
key = "outer_goal"
label = "外在目标"
field_type = "text"
help_text = "角色表面上要做什么"

[[optional_modules.fields]]
key = "core_conflict"
label = "核心冲突"
field_type = "text"
help_text = "什么阻碍角色达成目标"

[[optional_modules]]
id = "arc"
name = "成长弧光"
description = "角色在故事中的成长轨迹与转变"
icon = "TrendingUp"

[[optional_modules.fields]]
key = "arc_start"
label = "起点状态"
field_type = "text"

[[optional_modules.fields]]
key = "arc_turning"
label = "转折契机"
field_type = "text"

[[optional_modules.fields]]
key = "arc_end"
label = "终点蜕变"
field_type = "text"

[[optional_modules]]
id = "relations"
name = "人物关系"
description = "角色与其他人物的关系网络"
icon = "Users"

[[optional_modules.fields]]
key = "relationships"
label = "关系网络"
field_type = "richtext"
placeholder = "与其他角色的关系描述"

[[optional_modules]]
id = "quotes"
name = "经典台词"
description = "角色的标志性台词与金句集合"
icon = "Quote"

[[optional_modules.fields]]
key = "classic_quotes"
label = "金句与标志性台词"
field_type = "richtext"
placeholder = "收集角色的代表性台词"

# ===== 奇幻专属模块 =====
[[optional_modules]]
id = "magic_system"
name = "魔法体系"
description = "角色的魔法能力与修炼体系"
icon = "Sparkles"

[[optional_modules.fields]]
key = "magic_type"
label = "魔法类型"
field_type = "select"
options = ["元素", "精神", "神圣", "黑暗", "召唤", "时空", "其他"]

[[optional_modules.fields]]
key = "magic_level"
label = "强度等级"
field_type = "text"
placeholder = "如：S级/9阶/元婴期"

[[optional_modules.fields]]
key = "magic_cost"
label = "代价与限制"
field_type = "richtext"
help_text = "施法的代价、冷却、副作用"

[[optional_modules.fields]]
key = "special_abilities"
label = "特殊能力"
field_type = "richtext"

[[optional_modules]]
id = "combat"
name = "战斗能力"
description = "角色的战斗技能与武器配置"
icon = "Sword"

[[optional_modules.fields]]
key = "weapon"
label = "武器专精"
field_type = "text"

[[optional_modules.fields]]
key = "fighting_style"
label = "战斗风格"
field_type = "text"

[[optional_modules.fields]]
key = "handedness"
label = "惯用手"
field_type = "select"
options = ["左手", "右手", "双手"]
