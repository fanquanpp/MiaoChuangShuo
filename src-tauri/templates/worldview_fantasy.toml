# 奇幻世界观模板
# 适用于玄幻/奇幻题材，强化魔法体系与种族设定
# 派生自 worldview_standard，扩展 races 模块

id = "world-fantasy"
name = "奇幻世界观"
category = "worldview"
description = "适用于玄幻/奇幻题材，强化魔法体系与种族设定"
icon = "Globe"
default_enabled_modules = ["geography", "history", "power_system", "races"]

# ===== 基础字段（继承自标准世界观）=====
[[base_fields]]
key = "world_name"
label = "世界名称"
field_type = "text"
required = true
placeholder = "如：九州/中土/艾泽拉斯"

[[base_fields]]
key = "overview"
label = "世界概述"
field_type = "richtext"
placeholder = "一句话概括这个世界"

# ===== 可选模块（继承自标准世界观 + 种族设定扩展）=====
[[optional_modules]]
id = "geography"
name = "地理环境"
description = "世界的地理环境与自然资源"
icon = "Map"

