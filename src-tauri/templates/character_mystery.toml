# 悬疑角色模板
# 适用于悬疑/推理/犯罪题材，包含秘密与动机层次
# 派生自 character_standard，扩展 secrets/suspect 模块

id = "char-mystery"
name = "悬疑角色"
category = "character"
description = "适用于悬疑/推理/犯罪题材，包含秘密与动机层次"
icon = "User"
default_enabled_modules = ["personality", "background", "motivation"]

# ===== 基础字段（继承自标准角色）=====
[[base_fields]]
key = "name"
label = "姓名"
field_type = "text"
required = true
placeholder = "角色的全名"

[[base_fields]]
key = "age"
label = "年龄"
field_type = "text"
placeholder = "如：25"

[[base_fields]]
key = "gender"
label = "性别"
field_type = "select"
options = ["男", "女", "其他"]

[[base_fields]]
key = "identity"
label = "身份/职业"
field_type = "text"
placeholder = "如：剑客/学者/商人"

[[base_fields]]
key = "appearance"
label = "外貌描述"
field_type = "richtext"
placeholder = "体型、面容、穿着、标志性特征"

# ===== 可选模块（继承自标准角色 + 秘密档案与嫌疑人档案扩展）=====
[[optional_modules]]
id = "personality"
name = "性格档案"
description = "角色的核心性格特征与行为习惯"
icon = "Heart"

[[optional_modules.fields]]
key = "core_trait"
label = "核心特质"
field_type = "text"
placeholder = "如：执着、温柔、阴鸷"

[[optional_modules.fields]]
key = "strengths"
label = "优点"
field_type = "text"

[[optional_modules.fields]]
key = "weaknesses"
label = "缺点"
field_type = "text"

[[optional_modules.fields]]
key = "habit"
label = "口头禅/习惯动作"
field_type = "text"

[[optional_modules]]
id = "background"
name = "背景故事"
description = "角色的过去经历与性格形成原因"
icon = "BookOpen"

[[optional_modules.fields]]
key = "origin"
label = "出身来历"
field_type = "richtext"

[[optional_modules.fields]]
key = "key_experience"
label = "关键经历"
field_type = "richtext"

[[optional_modules.fields]]
key = "personality_cause"
label = "性格成因"
field_type = "richtext"

[[optional_modules]]
id = "motivation"
name = "动机与目标"
description = "驱动角色行动的内在动机与外在目标"
icon = "Target"

[[optional_modules.fields]]
key = "inner_motivation"
label = "内在动机"
field_type = "text"
help_text = "角色内心真正想要什么"

[[optional_modules.fields]]
key = "outer_goal"
label = "外在目标"
field_type = "text"
help_text = "角色表面上要做什么"

[[optional_modules.fields]]
key = "core_conflict"
label = "核心冲突"
field_type = "text"
help_text = "什么阻碍角色达成目标"

[[optional_modules]]
id = "arc"
name = "成长弧光"
description = "角色在故事中的成长轨迹与转变"
icon = "TrendingUp"

[[optional_modules.fields]]
key = "arc_start"
label = "起点状态"
field_type = "text"

[[optional_modules.fields]]
key = "arc_turning"
label = "转折契机"
field_type = "text"

[[optional_modules.fields]]
key = "arc_end"
label = "终点蜕变"
field_type = "text"

[[optional_modules]]
id = "relations"
name = "人物关系"
description = "角色与其他人物的关系网络"
icon = "Users"

[[optional_modules.fields]]
key = "relationships"
label = "关系网络"
field_type = "richtext"
placeholder = "与其他角色的关系描述"

[[optional_modules]]
id = "quotes"
name = "经典台词"
description = "角色的标志性台词与金句集合"
icon = "Quote"

[[optional_modules.fields]]
key = "classic_quotes"
label = "金句与标志性台词"
field_type = "richtext"
placeholder = "收集角色的代表性台词"

# ===== 悬疑专属模块 =====
[[optional_modules]]
id = "secrets"
name = "秘密档案"
description = "角色不为人知的秘密与谎言"
icon = "EyeOff"

[[optional_modules.fields]]
key = "hidden_secret"
label = "隐藏秘密"
field_type = "richtext"

[[optional_modules.fields]]
key = "past_lies"
label = "谎言清单"
field_type = "richtext"

[[optional_modules.fields]]
key = "unsolved_past"
label = "未公开过去"
field_type = "richtext"

[[optional_modules]]
id = "suspect"
name = "嫌疑人档案"
description = "角色的嫌疑程度与相关线索"
icon = "Search"

[[optional_modules.fields]]
key = "suspect_level"
label = "嫌疑等级"
field_type = "select"
options = ["证人", "次要嫌疑人", "主要嫌疑人", "真凶"]

[[optional_modules.fields]]
key = "alibi"
label = "不在场证明"
field_type = "text"

[[optional_modules.fields]]
key = "motive_layers"
label = "动机层次"
field_type = "richtext"
help_text = "表层动机/深层动机/真实动机"

[[optional_modules.fields]]
key = "clue_chain"
label = "线索链"
field_type = "richtext"
