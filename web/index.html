<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="喵创说 在线体验版 - 浏览器中即可体验的核心创作功能, 完整功能请下载桌面版" />
    <title>喵创说 - 在线体验版</title>
    <script>
      // FANDEX 防闪烁主题初始化脚本
      // 在页面渲染前同步读取 localStorage 主题, 避免 FOUC(主题闪烁)
      // 输入: 无
      // 输出: 无 (副作用: 在 documentElement 上添加 .light 类)
      // 流程:
      //   1. 读取 localStorage 中的主题键
      //   2. 校验主题值, 默认暗色
      //   3. 亮色主题时添加 .light 类
      (function () {
        try {
          var stored = localStorage.getItem('miaochuangshuo-web-theme');
          var theme = (stored === 'light' || stored === 'dark') ? stored : 'dark';
          if (theme === 'light') {
            document.documentElement.classList.add('light');
          }
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          // localStorage 不可用时默认暗色, 无需处理
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
