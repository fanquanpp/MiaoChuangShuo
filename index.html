<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovelForge - 离线小说创作工作站</title>
    <script>
      // FANDEX 防闪烁主题初始化脚本
      // 在页面渲染前同步读取 localStorage 主题，避免 FOUC(主题闪烁)
      (function () {
        try {
          var stored = localStorage.getItem('novelforge-theme');
          var theme = (stored === 'light' || stored === 'dark') ? stored : 'dark';
          if (theme === 'light') {
            document.documentElement.classList.add('light');
          }
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          // localStorage 不可用时默认暗色
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
